name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Razão para execução manual'
        required: true
        default: 'Teste de pipeline'

jobs:
  lint:
    name: Lint e Formatação
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install black isort pylint pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Verificar formatação com Black
        run: |
          black --check src/ notebooks/
      - name: Verificar imports com isort
        run: |
          isort --check-only --profile black src/ notebooks/
      - name: Lint com pylint
        run: |
          pylint --disable=C0111,C0103,C0303,W1201,W1202 src/

  test:
    name: Testes Unitários
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Executar testes
        run: |
          pytest --cov=src tests/

  build:
    name: Build e Validação
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Verificar estrutura do projeto
        run: |
          python -c "import os; assert os.path.exists('src'), 'Diretório src não encontrado'"
          python -c "import os; assert os.path.exists('notebooks'), 'Diretório notebooks não encontrado'"
      - name: Verificar notebooks
        run: |
          pip install nbconvert jupyter
          jupyter nbconvert --to notebook --execute notebooks/05_SHAP_Avancado.ipynb --output executed_notebook.ipynb || echo "Notebook execution failed but continuing"

  deploy:
    name: Deploy para DagsHub
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Instalar DVC
        run: |
          python -m pip install --upgrade pip
          pip install dvc dvc-gdrive
      - name: Configurar Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
      - name: Configurar DagsHub Remote
        run: |
          dvc remote modify --local myremote gdrive_use_service_account true
          echo "${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}" > sa_credentials.json
          dvc remote modify --local myremote gdrive_service_account_json_file_path sa_credentials.json
      - name: Pull DVC files
        run: |
          dvc pull
      - name: Push para DagsHub
        run: |
          git remote add dagshub https://dagshub.com/seu_usuario/Projeto_7_Sistema_de_Recomendacao.git
          git push dagshub main
          dvc push