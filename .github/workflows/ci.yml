name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with flake8 (errors only)
      run: |
        # Verificar apenas erros críticos
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=__pycache__,*.pyc
      continue-on-error: true
    
    - name: Check code formatting with black
      run: |
        black --check src/ tests/ || echo "Formatação pode ser melhorada"
      continue-on-error: true
    
    - name: Check import sorting with isort
      run: |
        isort --check-only src/ tests/ || echo "Imports podem ser organizados"
      continue-on-error: true
    
    - name: Run unit tests
      run: |
        python -m pytest tests/ -v --tb=short
      continue-on-error: true

  model-validation:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Validate model structure
      run: |
        python -c "
        import os
        import sys
        sys.path.append('src')
        
        # Verificar se os arquivos de modelo existem
        model_files = [
            'src/config/model_utils.py',
            'src/config/dagshub_config.py',
            'src/scripts/modelo_ensemble.py'
        ]
        
        for file in model_files:
            if not os.path.exists(file):
                print(f'Arquivo {file} não encontrado!')
                sys.exit(1)
            else:
                print(f'✓ {file} encontrado')
        
        print('✓ Todos os arquivos de modelo estão presentes')
        "
    
    - name: Test basic imports
      run: |
        python -c "
        import sys
        sys.path.append('src')
        
        try:
            import pandas as pd
            import numpy as np
            print('✓ Imports básicos funcionando')
        except ImportError as e:
            print(f'Erro de import: {e}')
            sys.exit(1)
        "

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run security scan with bandit
      run: |
        pip install bandit
        bandit -r src/ -f json -o bandit-report.json || true
    
    - name: Upload security scan results
      uses: actions/upload-artifact@v3
      with:
        name: security-scan-results
        path: bandit-report.json